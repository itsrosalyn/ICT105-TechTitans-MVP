<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AttendQR — GPS verification</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="page-gps">

<div class="nav">
  <div class="brand"><div class="mark">A</div>AttendQR</div>
  <div class="nav-links">
    <a href="home.html"
    <span>Home</span>
  </a>
    <span class="active">Check-in</span>
    <a href="records.html"
    <span>Records</span>
  </a>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="#" id="logout-link" style="font-size:12px;font-weight:600;color:var(--muted);text-decoration:none;">Log out</a>
    <div class="profile-menu-wrap">
      <div class="avatar" id="nav-avatar" style="cursor:pointer;">JS</div>
      <div class="profile-dropdown" id="profile-dropdown">
        <div class="profile-dropdown-header"><img class="profile-avatar-img" id="profile-avatar-img" alt="Profile picture"></div>
        <div class="profile-field"><span class="profile-label" id="profile-id-label">Student ID</span><span class="profile-value" id="profile-id">—</span></div>
        <div class="profile-field"><span class="profile-label">Full name</span><span class="profile-value" id="profile-name">—</span></div>
        <div class="profile-field"><span class="profile-label">Email</span><span class="profile-value" id="profile-email">—</span></div>
        <div class="profile-status" id="profile-status">—</div>
      </div>
    </div>
  </div>
</div>

<div class="wrap">

  <div class="step-track">
    <div class="step-dot done"></div>
    <div class="step-dot active"></div>
    <div class="step-dot"></div>
  </div>

  <div class="status-pill" id="status-pill"><span class="status-dot"></span>Within check-in range</div>

  <p class="title">Verifying your location</p>
  <p class="sub">We use GPS to confirm you're physically in the room before completing check-in.</p>

  <div class="map-frame">
    <div class="room-label" id="room-label">Room</div>
    <div class="radius-ring"></div>
    <div class="radius-ring inner"></div>
    <div class="pin"></div>
  </div>

  <div class="detail-card">
    <div class="detail-row"><span>Session</span><span class="val" id="detail-session">—</span></div>
    <div class="detail-row"><span>Distance from room</span><span class="val" id="detail-distance">—</span></div>
    <div class="detail-row"><span>Allowed radius</span><span class="val" id="detail-radius">—</span></div>
  </div>

  <button class="continue-btn" id="continue-btn">Confirm check-in</button>
  <button class="retry-btn" id="retry-btn">Retry location check</button>

</div>

<script type="module">
import { initGpsPage } from "./shared.js";
initGpsPage();
</script>

</body>
</html>
